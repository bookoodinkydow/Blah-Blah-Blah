<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- dimmed/tinted screenshots cycle behind everything, controlled from script.js -->
  <div id="bg-layer"></div>
  <div id="bg-layer-2"></div>

  <!-- faint grain, purely decorative -->
  <div id="noise-overlay"></div>

  <div id="page">

    <!-- ============ MAIN PANEL (modern glass card) ============ -->
    <div class="panel-modern" id="main-panel">

      <div id="logo-block">
        <span id="logo-text">Loading...</span>
        <div id="logo-accent"></div>
      </div>
      <div id="tagline">Loading placeholder tagline...</div>

      <div class="info-grid">
        <div class="info-chip">
          <div class="info-chip-label">Map</div>
          <div class="info-chip-value" id="field-map">Loading map...</div>
        </div>
        <div class="info-chip">
          <div class="info-chip-label">Gamemode</div>
          <div class="info-chip-value" id="field-gamemode">Loading gamemode...</div>
        </div>
        <div class="info-chip">
          <div class="info-chip-label">Max Players</div>
          <div class="info-chip-value" id="field-maxplayers">--</div>
        </div>
        <div class="info-chip">
          <div class="info-chip-label">Player</div>
          <div class="info-chip-value" id="field-player">Unknown</div>
        </div>
      </div>

      <div id="admins-block">
        <div class="section-label">Admins Online</div>
        <div id="admins-list"></div>
      </div>

      <div id="status-line">Retrieving server info...</div>

      <div class="progress-row">
        <div class="progress-outer">
          <div class="progress-inner" id="progress-bar"></div>
        </div>
        <div class="progress-label" id="progress-label">0%</div>
      </div>

      <div id="current-download">&nbsp;</div>

      <!-- scrolling console-style file log -->
      <div id="file-log"></div>

    </div>

    <!-- ============ TIPS PANEL ============ -->
    <div class="win-panel" id="tips-panel">
      <div class="win-titlebar">
        <span>Server Tips</span>
      </div>
      <div class="win-body">
        <div id="tips-text">Loading tips...</div>
      </div>
    </div>

    <div id="footer-text">Loading, please wait...</div>

  </div>

  <script src="script.js"></script>
</body>
</html>
